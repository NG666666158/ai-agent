services:
  orion-agent:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: orion-agent
    env_file:
      - .env
    ports:
      - "8011:8011"
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/healthz', timeout=5)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: orion-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: orion-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: orion-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  qdrant_storage:
